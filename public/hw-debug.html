<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HW Image Debug</title>
<style>
  body { background: #0a0810; color: #e0e0e0; font-family: monospace; padding: 16px; margin: 0; }
  h1 { color: #e0001f; font-size: 1.1rem; margin-bottom: 16px; }
  .card { background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .ok  { color: #4caf50; }
  .err { color: #e0001f; }
  .warn{ color: #c9a84c; }
  .label { color: #888; font-size: 0.75rem; margin-bottom: 4px; }
  .val { font-size: 0.85rem; word-break: break-all; }
  img.test { width: 80px; height: 120px; object-fit: cover; border-radius: 4px; border: 1px solid #333; display: block; margin-top: 8px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .img-card { background: #0e0d1a; border: 1px solid #222; border-radius: 6px; padding: 8px; min-width: 100px; }
  .status-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; margin-top: 4px; display: inline-block; }
</style>
</head>
<body>
<h1>🔍 Haunted Wallpapers — Image Debug</h1>

<div class="card" id="env-card">
  <div class="label">Environment Check</div>
  <div id="env-out">Checking...</div>
</div>

<div class="card">
  <div class="label">Direct R2 Image Tests (5 known images)</div>
  <div class="row" id="img-row"></div>
</div>

<div class="card">
  <div class="label">Next.js Image Optimizer Test (/_next/image)</div>
  <div class="row" id="next-img-row"></div>
</div>

<div class="card">
  <div class="label">Fetch / Network Tests</div>
  <div id="fetch-out">Running...</div>
</div>

<div class="card">
  <div class="label">Service Worker Status</div>
  <div id="sw-out">Checking...</div>
</div>

<div class="card">
  <div class="label">Console Errors (last 10 seconds)</div>
  <div id="console-out">Monitoring...</div>
</div>

<script>
// ── Capture console errors ──────────────────────────────────────────────
const errors = [];
const origError = console.error.bind(console);
console.error = (...args) => { errors.push(args.join(' ')); origError(...args); };

const R2_BASE = 'https://pub-ba82ea76f3604402b8760527cc87149c.r2.dev';
const ASSETS_BASE = 'https://assets.hauntedwallpapers.com';

const TEST_IMAGES = [
  { label: 'R2 direct (r2.dev)', url: `${R2_BASE}/haunted-cat-grin-dark-iphone-android.webp` },
  { label: 'R2 direct (android)', url: `${R2_BASE}/wallpapers/shadows-have-eyes-android.webp` },
  { label: 'R2 direct (new)', url: `${R2_BASE}/new/dark-horror-man-cosplay-makeup-idea.webp` },
  { label: 'Assets CDN', url: `${ASSETS_BASE}/haunted-cat-grin-dark-iphone-android.webp` },
  { label: 'Self-hosted /iphone', url: 'https://hauntedwallpapers.com/iphone' },
];

// ── Env check ───────────────────────────────────────────────────────────
document.getElementById('env-out').innerHTML = `
  <div class="val">User Agent: <span class="warn">${navigator.userAgent.slice(0, 80)}</span></div>
  <div class="val">Location: <span class="ok">${location.href}</span></div>
  <div class="val">Protocol: <span class="${location.protocol === 'https:' ? 'ok' : 'err'}">${location.protocol}</span></div>
  <div class="val">Online: <span class="${navigator.onLine ? 'ok' : 'err'}">${navigator.onLine}</span></div>
  <div class="val">Save-Data header: <span class="warn">${navigator.connection?.saveData ?? 'N/A'}</span></div>
`;

// ── Direct img tag tests ─────────────────────────────────────────────────
const imgRow = document.getElementById('img-row');
TEST_IMAGES.slice(0, 3).forEach(({ label, url }) => {
  const div = document.createElement('div');
  div.className = 'img-card';
  div.innerHTML = `<div class="label" style="font-size:0.6rem">${label}</div>`;
  const img = document.createElement('img');
  img.className = 'test';
  img.src = url;
  const tag = document.createElement('div');
  tag.className = 'status-tag';
  img.onload = () => { tag.textContent = '✅ Loaded'; tag.style.background = '#1a3a1a'; tag.style.color = '#4caf50'; };
  img.onerror = (e) => { tag.textContent = '❌ Failed'; tag.style.background = '#3a1a1a'; tag.style.color = '#e0001f'; };
  div.appendChild(img);
  div.appendChild(tag);
  imgRow.appendChild(div);
});

// ── Next.js image optimizer test ────────────────────────────────────────
const nextRow = document.getElementById('next-img-row');
const nextUrl = `//_next/image?url=${encodeURIComponent(R2_BASE + '/haunted-cat-grin-dark-iphone-android.webp')}&w=384&q=75`;
const nextDiv = document.createElement('div');
nextDiv.className = 'img-card';
nextDiv.innerHTML = `<div class="label" style="font-size:0.6rem">/_next/image optimizer</div>`;
const nextImg = document.createElement('img');
nextImg.className = 'test';
nextImg.src = nextUrl;
const nextTag = document.createElement('div');
nextTag.className = 'status-tag';
nextImg.onload = () => { nextTag.textContent = '✅ Loaded'; nextTag.style.background='#1a3a1a'; nextTag.style.color='#4caf50'; };
nextImg.onerror = () => { nextTag.textContent = '❌ Failed (optimizer broken?)'; nextTag.style.background='#3a1a1a'; nextTag.style.color='#e0001f'; };
nextDiv.appendChild(nextImg);
nextDiv.appendChild(nextTag);
nextRow.appendChild(nextDiv);

// ── Fetch tests ──────────────────────────────────────────────────────────
const fetchOut = document.getElementById('fetch-out');
const fetchTests = [
  { label: 'R2 CDN image (HEAD)', url: `${R2_BASE}/haunted-cat-grin-dark-iphone-android.webp`, method: 'HEAD' },
  { label: 'Assets CDN image (HEAD)', url: `${ASSETS_BASE}/haunted-cat-grin-dark-iphone-android.webp`, method: 'HEAD' },
  { label: 'Site /iphone page', url: 'https://hauntedwallpapers.com/iphone', method: 'HEAD' },
  { label: 'Site API health', url: 'https://hauntedwallpapers.com/api/wallpapers-public?limit=1', method: 'GET' },
];

async function runFetchTests() {
  let html = '';
  for (const t of fetchTests) {
    try {
      const start = Date.now();
      const r = await fetch(t.url, { method: t.method, cache: 'no-store' });
      const ms = Date.now() - start;
      const cf = r.headers.get('cf-cache-status') ?? 'none';
      const ct = r.headers.get('content-type') ?? '?';
      const ok = r.ok;
      html += `<div class="val ${ok ? 'ok' : 'err'}" style="margin-bottom:6px">
        ${ok ? '✅' : '❌'} <b>${t.label}</b><br>
        Status: <span class="${ok ? 'ok' : 'err'}">${r.status}</span> | 
        Time: ${ms}ms | 
        CF-Cache: <span class="warn">${cf}</span> | 
        Type: ${ct.slice(0,40)}
      </div>`;
    } catch (e) {
      html += `<div class="val err" style="margin-bottom:6px">❌ <b>${t.label}</b> — FETCH FAILED: ${e.message}</div>`;
    }
  }
  fetchOut.innerHTML = html;
}
runFetchTests();

// ── Service Worker check ─────────────────────────────────────────────────
const swOut = document.getElementById('sw-out');
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    if (regs.length === 0) {
      swOut.innerHTML = '<span class="ok">✅ No service workers registered</span>';
    } else {
      swOut.innerHTML = regs.map(r =>
        `<div class="val warn">⚠️ SW active: scope=${r.scope} state=${r.active?.state ?? 'none'}</div>`
      ).join('');
      swOut.innerHTML += `<div class="val" style="margin-top:6px">
        <button onclick="unregisterAll()" style="background:#e0001f;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:monospace">
          Unregister All SWs
        </button>
      </div>`;
    }
  });
} else {
  swOut.innerHTML = '<span class="warn">Service Workers not supported</span>';
}

window.unregisterAll = async () => {
  const regs = await navigator.serviceWorker.getRegistrations();
  await Promise.all(regs.map(r => r.unregister()));
  swOut.innerHTML = '<span class="ok">✅ All SWs unregistered — hard reload now</span>';
};

// ── Console errors output ────────────────────────────────────────────────
setTimeout(() => {
  const consoleOut = document.getElementById('console-out');
  consoleOut.innerHTML = errors.length === 0
    ? '<span class="ok">✅ No console errors captured</span>'
    : errors.map(e => `<div class="val err" style="margin-bottom:4px">${e}</div>`).join('');
}, 3000);
</script>
</body>
</html>
